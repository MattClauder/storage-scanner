                  statusFilter === s
                    ? statusColors[s]?.text || "#1e40af"
                    : "#475569",
                fontSize: 13,
                fontWeight: 500,
                cursor: "pointer",
              }}
            >
              {s}
            </button>
          ))}
        </div>
        <div style={{ display: "flex", gap: 6, marginLeft: "auto" }}>
          <span
            style={{
              fontSize: 13,
              fontWeight: 600,
              color: "#475569",
              alignSelf: "center",
              marginRight: 4,
            }}
          >
            Sort:
          </span>
          {[
            { key: "status", label: "Status" },
            { key: "price", label: "Price" },
            { key: "zone", label: "Zone" },
          ].map((s) => (
            <button
              key={s.key}
              onClick={() => setSortBy(s.key)}
              style={{
                padding: "6px 14px",
                borderRadius: 6,
                border: "1px solid",
                borderColor: sortBy === s.key ? "#3b82f6" : "#e2e8f0",
                background: sortBy === s.key ? "#3b82f6" : "#fff",
                color: sortBy === s.key ? "#fff" : "#475569",
                fontSize: 13,
                fontWeight: 500,
                cursor: "pointer",
              }}
            >
              {s.label}
            </button>
          ))}
        </div>
      </div>

      {/* Results Count */}
      <div style={{ fontSize: 13, color: "#64748b", marginBottom: 12 }}>
        Showing {filtered.length} of {properties.length} properties
      </div>

      {/* Property Cards */}
      <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
        {filtered.map((p) => {
          const sc = statusColors[p.status] || statusColors.TRACKING;
          const zc = zoneColors[p.zone] || zoneColors.Houston;
          const expanded = expandedId === p.id;

          return (
            <div
              key={p.id}
              style={{
                background: "#fff",
                borderRadius: 12,
                border: `1px solid ${p.isNew ? "#fcd34d" : "#e2e8f0"}`,
                boxShadow: p.isNew
                  ? "0 0 0 2px #fef3c7"
                  : "0 1px 3px rgba(0,0,0,0.04)",
                overflow: "hidden",
              }}
            >
              {/* Main Row */}
              <div
                onClick={() => setExpandedId(expanded ? null : p.id)}
                style={{
                  display: "grid",
                  gridTemplateColumns: "auto 1fr auto auto auto auto",
                  alignItems: "center",
                  gap: 16,
                  padding: "14px 18px",
                  cursor: "pointer",
                }}
              >
                {/* Zone Badge */}
                <div
                  style={{
                    width: 4,
                    height: 44,
                    borderRadius: 2,
                    background: zc.accent,
                  }}
                />

                {/* Address + City */}
                <div>
                  <div
                    style={{ display: "flex", alignItems: "center", gap: 8 }}
                  >
                    {p.isNew && <span style={{ fontSize: 14 }}>ð</span>}
                    <span
                      style={{
                        fontWeight: 600,
                        fontSize: 15,
                        color: "#0f172a",
                      }}
                    >
                      {p.address}
                    </span>
                    <span
                      style={{
                        background: sc.bg,
                        color: sc.text,
                        border: `1px solid ${sc.border}`,
                        padding: "2px 8px",
                        borderRadius: 4,
                        fontSize: 11,
                        fontWeight: 600,
                      }}
                    >
                      {p.status}
                    </span>
                  </div>
                  <div
                    style={{
                      fontSize: 13,
                      color: "#64748b",
                      marginTop: 2,
                    }}
                  >
                    {p.city} Â· {p.zone} Zone Â· {p.type}
                    {p.source && (
                      <span style={{ marginLeft: 8, color: "#94a3b8" }}>
                        via {p.source}
                      </span>
                    )}
                  </div>
                </div>

                {/* Price */}
                <div style={{ textAlign: "right", minWidth: 100 }}>
                  <div
                    style={{
                      fontWeight: 700,
                      fontSize: 16,
                      color: p.price ? "#0f172a" : "#94a3b8",
                    }}
                  >
                    {formatPrice(p.price)}
                  </div>
                </div>

                {/* Units / SF */}
                <div style={{ textAlign: "right", minWidth: 80 }}>
                  <div
                    style={{
                      fontSize: 14,
                      fontWeight: 600,
                      color: "#334155",
                    }}
                  >
                    {p.units ? `${p.units} units` : "â"}
                  </div>
                  <div style={{ fontSize: 12, color: "#94a3b8" }}>
                    {formatSqft(p.sqft)}
                  </div>
                </div>

                {/* Cap Rate */}
                <div style={{ textAlign: "right", minWidth: 70 }}>
                  <div
                    style={{
                      fontSize: 14,
                      fontWeight: 600,
                      color: p.capRate ? "#059669" : "#94a3b8",
                    }}
                  >
                    {p.capRate ? `${p.capRate}%` : "â"}
                  </div>
                  <div style={{ fontSize: 11, color: "#94a3b8" }}>
                    Cap Rate
                  </div>
                </div>

                {/* DD Status Dropdown */}
                <div onClick={(e) => e.stopPropagation()}>
                  <select
                    value={ddStatuses[p.id]}
                    onChange={(e) =>
                      setDdStatuses((prev) => ({
                        ...prev,
                        [p.id]: e.target.value,
                      }))
                    }
                    style={{
                      padding: "4px 8px",
                      borderRadius: 6,
                      border: "1px solid #e2e8f0",
                      fontSize: 12,
                      fontWeight: 500,
                      color: ddStatusColors[ddStatuses[p.id]] || "#64748b",
                      background: "#f8fafc",
                      cursor: "pointer",
                      minWidth: 130,
                    }}
                  >
                    {ddOptions.map((opt) => (
                      <option key={opt} value={opt}>
                        {opt}
                      </option>
                    ))}
                  </select>
                </div>
              </div>

              {/* Expanded Details */}
              {expanded && (
                <div
                  style={{
                    padding: "0 18px 16px 36px",
                    borderTop: "1px solid #f1f5f9",
                    paddingTop: 14,
                  }}
                >
                  <div
                    style={{
                      display: "grid",
                      gridTemplateColumns: "1fr 1fr",
                      gap: 12,
                      fontSize: 13,
                    }}
                  >
                    <div>
                      <span style={{ color: "#94a3b8" }}>Operator:</span>{" "}
                      <span style={{ color: "#334155" }}>
                        {p.operator || "Unknown"}
                      </span>
                    </div>
                    <div>
                      <span style={{ color: "#94a3b8" }}>Occupancy:</span>{" "}
                      <span style={{ color: "#334155" }}>
                        {p.occupancy || "Unknown"}
                      </span>
                    </div>
                    <div style={{ gridColumn: "1 / -1" }}>
                      <span style={{ color: "#94a3b8" }}>Notes:</span>{" "}
                      <span style={{ color: "#334155" }}>{p.notes}</span>
                    </div>
                    {p.sourceUrl && (
                      <div style={{ gridColumn: "1 / -1" }}>
                        <span style={{ color: "#94a3b8" }}>Listing:</span>{" "}
                        <a
                          href={p.sourceUrl}
                          target="_blank"
                          rel="noopener noreferrer"
                          style={{
                            color: "#3b82f6",
                            textDecoration: "none",
                          }}
                        >
                          View on {p.source} â
                        </a>
                      </div>
                    )}
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>

      {/* Footer */}
      <div
        style={{
          marginTop: 32,
          padding: "16px 0",
          borderTop: "1px solid #e2e8f0",
          fontSize: 12,
          color: "#94a3b8",
          textAlign: "center",
        }}
      >
        Self-Storage Acquisition Scanner â Scan run {SCAN_DATE} â Platforms
        searched: Crexi/LoopNet, CityFeet, BizQuest, HAR, TXSSA â Target: Houston + Dallas Zones â Enclosed, $1-4M
      </div>
    </div>
  );
}

ReactDOM.render(React.createElement(StorageDashboard), document.getElementById('root'));
  </script>
</body>
</html>
