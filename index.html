function formatPrice(price) {
  if (!price) return "Price Upon Request";
  if (price >= 1000000) return "$" + (price / 1000000).toFixed(price % 1000000 === 0 ? 0 : 2) + "M";
  return "$" + price.toLocaleString();
}
function formatSqft(sqft) { return sqft ? sqft.toLocaleString() + " SF" : ""; }
function formatDollars(n) { return n ? "$" + n.toLocaleString() : "\u2014"; }
function formatPct(n) { return n != null ? n.toFixed(2) + "%" : "\u2014"; }

  };
  return (
    <span className={`inline-flex px-2 py-0.5 rounded-full text-xs font-semibold border ${colors[status] || "bg-gray-100 text-gray-700 border-gray-300"}`}>
      {status}

  );
}

        <div><span className="text-gray-400">Pro Forma NOI:</span> <span className="font-semibold text-teal-700">{formatDollars(f.proFormaNoi)}</span></div>
        <div><span className="text-gray-400">Pro Forma Cap:</span> <span className="font-semibold text-teal-700">{formatPct(f.proFormaCapRate)}</span></div>

function DDChecklist({ docs }) {
  const coreDocs = ["OM", "Rent Roll", "T-12", "P&L"];
  const getDoc = (type) => docs && docs.find(d => (typeof d === "string" ? d : d.type) === type);
  const hasDoc = (type) => !!getDoc(type);
  const coreCount = coreDocs.filter(hasDoc).length;
  const pct = Math.round((coreCount / coreDocs.length) * 100);

  return (
    <div className="mt-3 bg-white rounded-lg border border-gray-200 p-3">
      <div className="flex items-center justify-between mb-2">
        <h4 className="text-xs font-bold text-gray-700 uppercase tracking-wide">DD Document Checklist</h4>
        <span className={`text-xs font-semibold px-2 py-0.5 rounded-full ${
          pct === 100 ? "bg-green-100 text-green-700" :
          pct >= 50 ? "bg-yellow-100 text-yellow-700" :
          "bg-gray-100 text-gray-500"
        }`}>{pct}% Core</span>
      </div>
      <div>
        {coreDocs.map(type => {
          const doc = getDoc(type);
          const url = doc && typeof doc === "object" ? doc.url : null;
          return (
          <div key={type} className={`flex items-center gap-1.5 py-0.5 text-xs ${doc ? "text-emerald-700" : "text-gray-400"}`}>
            <span style={{fontSize:"11px"}}>{doc ? "\u2705" : "\u274C"}</span>
            {url ? (
              <a href={url} target="_blank" rel="noopener noreferrer" className="underline hover:text-emerald-900 cursor-pointer">{type}</a>
            ) : (
              <span>{type}</span>
            )}
          </div>);
        })}
      </div>
    </div>
  );
}

function DealComparison({ properties }) {
  const withFinancials = properties.filter(p => p.financials && p.price);
  if (withFinancials.length === 0) return null;

  const scored = withFinancials.map(p => {
    const f = p.financials;
    let score = 0;
    // GR Payback (lower is better, 7-9 range ideal)
    if (f.grossRevenuePayback) {
      if (f.grossRevenuePayback >= 7 && f.grossRevenuePayback <= 9) score += 25;
      else if (f.grossRevenuePayback < 7) score += 30;
      else score += Math.max(0, 20 - (f.grossRevenuePayback - 9) * 5);
    }
    // Pro forma cap rate (higher is better)
    if (f.proFormaCapRate) score += Math.min(30, f.proFormaCapRate * 3);
    // Current cap (higher is better)
    if (f.noi && p.price) score += Math.min(20, ((f.noi / p.price) * 100) * 3);
    // Value-add upside (gap between current and pro forma NOI)
    if (f.noi && f.proFormaNoi) {
      const upside = ((f.proFormaNoi - f.noi) / f.noi) * 100;
      score += Math.min(20, upside * 0.3);
    }
    return { ...p, dealScore: Math.round(score) };
  }).sort((a, b) => b.dealScore - a.dealScore);

  return (
    <div className="bg-white rounded-xl shadow-sm border border-teal-200 p-4 sm:p-5 mb-4">
      <h2 className="text-sm font-bold text-teal-900 uppercase tracking-wide mb-3 flex items-center gap-2">
        <span>&#127942;</span> Deal Comparison (Properties with Financials)
      </h2>
      <div className="overflow-x-auto">
        <table className="w-full text-xs">
          <thead>
            <tr className="border-b border-gray-200">
              <th className="text-left py-2 pr-3 text-gray-500 font-medium">Rank</th>
              <th className="text-left py-2 pr-3 text-gray-500 font-medium">Property</th>
              <th className="text-right py-2 pr-3 text-gray-500 font-medium">Price</th>
              <th className="text-right py-2 pr-3 text-gray-500 font-medium">Units</th>
              <th className="text-right py-2 pr-3 text-gray-500 font-medium">Current NOI</th>
              <th className="text-right py-2 pr-3 text-gray-500 font-medium">Cap Rate</th>
              <th className="text-right py-2 pr-3 text-gray-500 font-medium">GR Payback</th>
              <th className="text-right py-2 pr-3 text-gray-500 font-medium">PF NOI</th>
              <th className="text-right py-2 pr-3 text-gray-500 font-medium">PF Cap</th>
              <th className="text-right py-2 pr-3 text-gray-500 font-medium">Upside</th>
              <th className="text-right py-2 text-gray-500 font-medium">Score</th>
            </tr>
          </thead>
          <tbody>
            {scored.map((p, i) => {
              const f = p.financials;
              const currentCap = f.noi && p.price ? ((f.noi / p.price) * 100) : null;
              const upside = f.noi && f.proFormaNoi ? (((f.proFormaNoi - f.noi) / f.noi) * 100) : null;
              return (
                <tr key={p.id} className="border-b border-gray-100 hover:bg-gray-50">
                  <td className="py-2.5 pr-3">
                    <span className={`inline-flex items-center justify-center w-6 h-6 rounded-full text-xs font-bold ${i === 0 ? "bg-teal-600 text-white" : "bg-gray-200 text-gray-600"}`}>
                      {i + 1}
                    </span>
                  </td>
                  <td className="py-2.5 pr-3">
                    <div className="font-semibold text-gray-900">{p.address}</div>
                    <div className="text-gray-400">{p.city}, {p.state}</div>
                  </td>
                  <td className="py-2.5 pr-3 text-right font-semibold text-gray-900">{formatPrice(p.price)}</td>
                  <td className="py-2.5 pr-3 text-right text-gray-700">{p.units || "\u2014"}</td>
                  <td className="py-2.5 pr-3 text-right text-gray-700">{formatDollars(f.noi)}</td>
                  <td className="py-2.5 pr-3 text-right text-gray-700">{currentCap ? currentCap.toFixed(2) + "%" : "\u2014"}</td>
                  <td className={`py-2.5 pr-3 text-right font-semibold ${f.grossRevenuePayback >= 7 && f.grossRevenuePayback <= 9 ? "text-green-700" : "text-orange-600"}`}>
                    {f.grossRevenuePayback ? f.grossRevenuePayback.toFixed(1) + "yr" : "\u2014"}
                  </td>
                  <td className="py-2.5 pr-3 text-right font-semibold text-teal-700">{formatDollars(f.proFormaNoi)}</td>
                  <td className="py-2.5 pr-3 text-right font-semibold text-teal-700">{f.proFormaCapRate ? f.proFormaCapRate.toFixed(2) + "%" : "\u2014"}</td>
                  <td className="py-2.5 pr-3 text-right font-semibold text-emerald-600">{upside ? "+" + upside.toFixed(0) + "%" : "\u2014"}</td>
                  <td className="py-2.5 text-right">
                    <span className={`inline-flex px-2 py-0.5 rounded-full font-bold ${p.dealScore >= 70 ? "bg-teal-100 text-teal-800" : p.dealScore >= 50 ? "bg-yellow-100 text-yellow-800" : "bg-gray-100 text-gray-600"}`}>
                      {p.dealScore}
                    </span>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
      {withFinancials.length === 1 && (
        <p className="text-xs text-gray-400 mt-3 italic">Upload OMs for more properties to compare deals side by side.</p>
      )}
    </div>
  );
}

function StorageDashboard() {
  const [properties, setProperties] = useState(initialProperties);
  const [zoneFilter, setZoneFilter] = useState("All");
  const [statusFilter, setStatusFilter] = useState("All");
  const [sortBy, setSortBy] = useState("status");
  const [expandedId, setExpandedId] = useState(null);

  const updateDDStatus = (id, newStatus) => {
    setProperties(prev => prev.map(p => p.id === id ? { ...p, ddStatus: newStatus } : p));
  };

  const statusOrder = { "STRONG": 0, "NEW": 1, "TRACKING": 2, "DD REVIEWED": 3 };

  const filtered = useMemo(() => {
    let result = [...properties];
    if (zoneFilter !== "All") result = result.filter(p => p.zone === zoneFilter);
    if (statusFilter !== "All") result = result.filter(p => p.status === statusFilter);
    result.sort((a, b) => {
      if (sortBy === "status") return (statusOrder[a.status] ?? 99) - (statusOrder[b.status] ?? 99);
      if (sortBy === "price") return (a.price || Infinity) - (b.price || Infinity);
      if (sortBy === "zone") return a.zone.localeCompare(b.zone);
      if (sortBy === "sqft") return (b.sqft || 0) - (a.sqft || 0);
      return 0;
    });
    return result;
  }, [properties, zoneFilter, statusFilter, sortBy]);

  const stats = useMemo(() => ({
    total: properties.length,
    newCount: properties.filter(p => p.isNew).length,
    strong: properties.filter(p => p.status === "STRONG").length,
    inBudget: properties.filter(p => p.price && p.price >= 1000000 && p.price <= 4000000).length,
    withDocs: properties.filter(p => p.docs && p.docs.length > 0).length,
    withFinancials: properties.filter(p => p.financials).length,
  }), [properties]);

  const priorityActions = [
    { priority: 1, action: "Get pricing on 3020 Duncanville Rd, Dallas \u2014 172 enclosed units at only 35% occupancy = massive value-add if priced under $2M", urgency: "HIGH" },
    { priority: 2, action: "Request pricing for 522 Crenshaw Rd (28,200 SF) and 2319 Preston Ave (29,724 SF) in Pasadena \u2014 both new enclosed listings", urgency: "HIGH" },
    { priority: 3, action: "Deep-dive 2601 Willowbrook Rd OM \u2014 model rent bumps to market ($97\u2192$111 on 10x10s), validate pro forma assumptions", urgency: "MEDIUM" },
    { priority: 4, action: "Investigate Dallas 75253 listing (13,112 SF) \u2014 identify address, get pricing details", urgency: "MEDIUM" },
    { priority: 5, action: "Contact Adam Schober re: North Houston 3-Property Group \u2014 (903) 941-3655", urgency: "MEDIUM" },
    { priority: 6, action: "Request pricing from Direct Equity for 14531 FM 529, Houston (53,610 SF)", urgency: "LOW" },
  ];

  return (
    <div className="min-h-screen bg-gray-50 p-3 sm:p-6" style={{ fontFamily: "system-ui, -apple-system, sans-serif" }}>
      {/* Header */}
      <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-4 sm:p-5 mb-4">
        <div className="flex items-center justify-between flex-wrap gap-2">
          <div>
            <h1 className="text-lg sm:text-xl font-bold text-gray-900">Self-Storage Acquisition Scanner</h1>
            <p className="text-xs sm:text-sm text-gray-500 mt-0.5">Scan date: {SCAN_DATE} &middot; Houston & Dallas Zones &middot; $1-4M &middot; Enclosed facilities</p>
          </div>
          <span className="inline-flex items-center gap-1.5 bg-green-50 text-green-700 border border-green-200 rounded-full px-3 py-1 text-xs font-medium">
            <span className="w-1.5 h-1.5 rounded-full bg-green-500"></span>
            Scan Complete
          </span>
        </div>
      </div>

      {/* Stats */}
      <div className="grid grid-cols-3 sm:grid-cols-6 gap-2 sm:gap-3 mb-4">
        {[
          { label: "Total Tracked", value: stats.total, bg: "bg-white", color: "text-gray-900" },
          { label: "New This Scan", value: stats.newCount, bg: "bg-blue-50 border-blue-200", color: "text-blue-700", prefix: "\ud83c\udd95 " },
          { label: "Strong Leads", value: stats.strong, bg: "bg-green-50 border-green-200", color: "text-green-700" },
          { label: "In Budget", value: stats.inBudget, bg: "bg-emerald-50 border-emerald-200", color: "text-emerald-700" },
          { label: "Docs on File", value: stats.withDocs, bg: "bg-teal-50 border-teal-200", color: "text-teal-700" },
          { label: "Financials", value: stats.withFinancials, bg: "bg-cyan-50 border-cyan-200", color: "text-cyan-700" },
        ].map((stat, i) => (
          <div key={i} className={`rounded-lg border p-3 text-center ${stat.bg}`}>
            <div className={`text-xl sm:text-2xl font-bold ${stat.color}`}>{stat.prefix || ""}{stat.value}</div>
            <div className="text-xs text-gray-500 mt-0.5">{stat.label}</div>
          </div>
        ))}
      </div>

      {/* Deal Comparison */}
      <DealComparison properties={properties} />

      {/* Priority Actions */}
      <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-4 sm:p-5 mb-4">
        <h2 className="text-sm font-bold text-gray-900 uppercase tracking-wide mb-3">Priority Actions This Week</h2>
        <div className="space-y-2.5">
          {priorityActions.map((item) => (
            <div key={item.priority} className="flex items-start gap-3 text-sm">
              <span className="flex-shrink-0 w-5 h-5 rounded-full bg-gray-800 text-white text-xs flex items-center justify-center font-bold mt-0.5">
                {item.priority}
              </span>
              <span className="flex-1 text-gray-700 leading-snug">{item.action}</span>
              <span className={`flex-shrink-0 text-xs font-semibold px-2 py-0.5 rounded-full ${
                item.urgency === "CRITICAL" ? "bg-red-100 text-red-700" :
                item.urgency === "HIGH" ? "bg-orange-100 text-orange-700" :
                item.urgency === "MEDIUM" ? "bg-yellow-100 text-yellow-700" :
                "bg-gray-100 text-gray-500"
              }`}>{item.urgency}</span>
            </div>
          ))}
        </div>
      </div>

      {/* Filters */}
      <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-3 mb-4">
        <div className="flex flex-wrap items-center gap-2 sm:gap-3">
          <div className="flex items-center gap-1.5">
            <span className="text-xs font-medium text-gray-400 uppercase tracking-wide">Zone</span>
            {["All", "Houston", "Dallas"].map(z => (
              <button key={z} onClick={() => setZoneFilter(z)}
                className={`px-2.5 py-1 text-xs rounded-full font-medium border transition-all ${
                  zoneFilter === z ? "bg-gray-800 text-white border-gray-800 shadow-sm" : "bg-white text-gray-500 border-gray-200 hover:border-gray-400 hover:text-gray-700"
                }`}>{z}</button>
            ))}
          </div>
          <span className="hidden sm:block w-px h-5 bg-gray-200" />
          <div className="flex items-center gap-1.5 flex-wrap">
            <span className="text-xs font-medium text-gray-400 uppercase tracking-wide">Status</span>
            {["All", ...PROPERTY_STATUSES].map(s => (
              <button key={s} onClick={() => setStatusFilter(s)}
                className={`px-2.5 py-1 text-xs rounded-full font-medium border transition-all ${
                  statusFilter === s ? "bg-gray-800 text-white border-gray-800 shadow-sm" : "bg-white text-gray-500 border-gray-200 hover:border-gray-400 hover:text-gray-700"
                }`}>{s}</button>
            ))}
          </div>
          <span className="hidden sm:block w-px h-5 bg-gray-200" />
          <div className="flex items-center gap-1.5">
            <span className="text-xs font-medium text-gray-400 uppercase tracking-wide">Sort</span>
            <select value={sortBy} onChange={e => setSortBy(e.target.value)}
              className="text-xs border border-gray-200 rounded-lg px-2 py-1 bg-white focus:outline-none focus:ring-1 focus:ring-blue-400">
              <option value="status">Priority</option>
              <option value="price">Price</option>
              <option value="zone">Zone</option>
              <option value="sqft">Size</option>
            </select>
          </div>
          <div className="ml-auto text-xs text-gray-400">{filtered.length}/{properties.length}</div>
        </div>
      </div>

      {/* Property Cards */}
      <div className="space-y-2.5">
        {filtered.map((p) => (
          <div key={p.id}
            className={`bg-white rounded-xl border shadow-sm overflow-hidden transition-all ${
              p.isNew ? "border-blue-300 ring-1 ring-blue-100" : p.financials ? "border-teal-200" : "border-gray-200"
            }`}>
            <div className="p-3 sm:p-4 cursor-pointer hover:bg-gray-50/50 transition-colors" onClick={() => setExpandedId(expandedId === p.id ? null : p.id)}>
              <div className="flex items-start justify-between gap-3">
                <div className="flex-1 min-w-0">
                  <div className="flex items-center gap-1.5 mb-1 flex-wrap">
                    {p.isNew && <span className="text-sm" title="New this scan">{"\ud83c\udd95"}</span>}
                    <StatusBadge status={p.status} />
                    <span className="text-xs text-gray-400 bg-gray-50 px-1.5 py-0.5 rounded border border-gray-100">{p.zone}</span>
                    <DocsBadge docs={p.docs} />
                  </div>
                  <h3 className="font-semibold text-gray-900 text-sm leading-tight">{p.address}</h3>
                  <p className="text-xs text-gray-500">{p.city}, {p.state} {p.zip}</p>
                </div>
                <div className="text-right flex-shrink-0">
                  <div className={`font-bold text-sm ${p.price ? "text-gray-900" : "text-gray-400 text-xs"}`}>{formatPrice(p.price)}</div>
                  <div className="text-xs text-gray-500 mt-0.5">
                    {p.units ? <span>{p.units} units</span> : null}
                    {p.units && p.sqft ? " \u00b7 " : ""}
                    {p.sqft ? <span>{formatSqft(p.sqft)}</span> : null}
                    {!p.units && !p.sqft ? <span className="text-gray-400">Details TBD</span> : null}
                  </div>
                  {p.capRate && <div className="text-xs text-green-600 font-semibold mt-0.5">{p.capRate}% Cap</div>}
                </div>
              </div>
              <div className="flex items-center gap-2 mt-2 flex-wrap">
                <span className="text-xs text-gray-500 bg-gray-50 px-1.5 py-0.5 rounded">{p.facilityType}</span>
                {p.occupancy && <span className="text-xs text-gray-500">Occ: {p.occupancy}</span>}
                <span className="text-xs text-gray-400 italic">via {p.source}</span>
                <div className="ml-auto" onClick={e => e.stopPropagation()}>
                  <DDStatusDropdown value={p.ddStatus} onChange={(v) => updateDDStatus(p.id, v)} />
                </div>
              </div>
            </div>

            {expandedId === p.id && (
              <div className="border-t border-gray-100 bg-gray-50 p-3 sm:p-4">
                <div className="grid grid-cols-2 gap-x-4 gap-y-2 text-xs mb-3">
                  <div><span className="text-gray-400">Operator:</span> <span className="font-medium text-gray-700">{p.operator || "Unknown"}</span></div>
                  <div><span className="text-gray-400">Type:</span> <span className="font-medium text-gray-700">{p.facilityType}</span></div>
                  <div><span className="text-gray-400">Occupancy:</span> <span className="font-medium text-gray-700">{p.occupancy || "Unknown"}</span></div>
                  <div><span className="text-gray-400">Source:</span> <span className="font-medium text-gray-700">{p.source}</span></div>
                </div>
                <div className="text-xs text-gray-600 bg-white rounded-lg border border-gray-200 p-2.5 leading-relaxed">
                  <span className="font-semibold text-gray-700">Notes: </span>{p.notes}
                </div>
                {p.sourceUrl && (
                  <a href={p.sourceUrl} target="_blank" rel="noopener noreferrer"
                    className="inline-flex items-center gap-1 mt-2 text-xs text-blue-600 hover:text-blue-800 hover:underline font-medium">
                    View Listing Source &rarr;
                  </a>
                )}
                <DDChecklist docs={p.docs} />
                <FinancialSummary f={p.financials} price={p.price} />
              </div>
            )}
          </div>
        ))}
      </div>

      {/* Footer */}
      <div className="mt-8 text-center text-xs text-gray-400 pb-6 space-y-1">
        <p>Sources scanned: Crexi &middot; LoopNet &middot; CityFeet &middot; BizQuest &middot; HAR &middot; TXSSA &middot; Showcase</p>
        <p>Houston Zone: Harris Co + Conroe/Willis/Cleveland/Navasota/Brenham + Spring/Tomball/Magnolia/New Caney/Humble/Porter</p>
        <p>Dallas Zone: Dallas County + Mesquite + Balch Springs + DFW Suburbs</p>
        <p>Criteria: Enclosed (AC or Non-AC) &middot; $1-4M &middot; 7-9yr Gross Revenue Payback &middot; Minimal Parking</p>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<StorageDashboard />);
  </script>
</body>
</html>
